<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmación de Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .background-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Enfoca la parte inferior de la foto donde están los novios */
            object-position: center bottom; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Degradado invertido para ayudar a leer arriba */
            background: linear-gradient(to top, rgba(0,0,0,0) 40%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            /* UBICACIÓN EN LA PARTE SUPERIOR */
            justify-content: flex-start; 
            height: 100vh;
            padding: 40px 20px; /* Espacio superior para que respire */
            box-sizing: border-box;
        }

        /* RECUADRO CENTRADO Y SUPERIOR */
        .form-card { 
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(5px);
            padding: 25px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 380px; 
            margin: 0 auto; /* Centrado horizontal */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--gold); font-size: 17px; margin: 0 0 15px 0; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
        .info-pases { background: #fdfaf3; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; color: #444; border: 1px solid var(--gold); font-weight: 600; }
        
        label { display: block; text-align: left; margin: 10px 0 5px; font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; }
        select, input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; 
            font-family: 'Montserrat'; font-size: 14px; background: white; margin-bottom: 5px;
            -webkit-appearance: none;
        }

        .acomp-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; display: none; }
        
        .btn-submit { 
            width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 8px; 
            background: var(--gold); color: white; font-weight: bold; cursor: pointer; font-size: 14px; 
        }

        @media (min-width: 768px) {
            .content-wrapper { justify-content: center; } /* En PC se mantiene al centro */
        }
    </style>
</head>
<body>

    <div class="background-container">
        <img src="novios.jpeg" id="bgImg">
    </div>
    
    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="form-card" id="formCard">
            <h2 id="saludo">¡HOLA!</h2>
            
            <div class="info-pases" id="infoPases">Cargando datos...</div>

            <form id="confirmForm">
                <label>¿Confirmas tu asistencia?</label>
                <select id="asistencia" required onchange="validarAsistencia()">
                    <option value="SÍ">SÍ, ASISTIRÉ</option>
                    <option value="NO">NO PODRÉ ASISTIR</option>
                </select>

                <div id="seccionCantidadPases">
                    <label>Pases a confirmar:</label>
                    <select id="pasesConfirmados" onchange="generarInputsAcomp()"></select>
                </div>

                <div id="acompSection" class="acomp-section">
                    <label>Nombre(s) de acompañante(s):</label>
                    <div id="inputsAcomp"></div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">CONFIRMAR ASISTENCIA</button>
            </form>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nombreURL = params.get('id') ? params.get('id').replace(/_/g, ' ') : "Invitado";
    const pasesMax = parseInt(params.get('pases')) || 1;

    document.getElementById('saludo').innerText = "¡HOLA, " + nombreURL.toUpperCase() + "!";
    document.getElementById('infoPases').innerText = "Tienes " + pasesMax + " pase(s) reservado(s).";

    const selectPases = document.getElementById('pasesConfirmados');
    for (let i = 1; i <= pasesMax; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectPases.appendChild(opt);
    }

    // RESTRICCIÓN 1 PASO
    if (pasesMax === 1) {
        document.getElementById('seccionCantidadPases').style.display = "none";
        document.getElementById('acompSection').style.display = "none";
        selectPases.value = 1;
    }

    function validarAsistencia() {
        const asiste = document.getElementById('asistencia').value;
        const seccionPases = document.getElementById('seccionCantidadPases');
        const seccionAcomp = document.getElementById('acompSection');

        if (asiste === "NO") {
            seccionPases.style.display = "none";
            seccionAcomp.style.display = "none";
        } else {
            if (pasesMax > 1) {
                seccionPases.style.display = "block";
                generarInputsAcomp();
            }
        }
    }

    function generarInputsAcomp() {
        const cantidad = parseInt(selectPases.value);
        const container = document.getElementById('inputsAcomp');
        const seccionAcomp = document.getElementById('acompSection');
        container.innerHTML = "";

        if (cantidad > 1) {
            seccionAcomp.style.display = "block";
            for (let i = 1; i < cantidad; i++) {
                container.innerHTML += `<input type="text" class="nombre-acomp" placeholder="Nombre completo" required style="margin-bottom:8px;">`;
            }
        } else {
            seccionAcomp.style.display = "none";
        }
    }

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";
        
        const urlScript = 'https://script.google.com/macros/s/AKfycbwOgIwOfJB2WAu2slVtCq8xRiTtd9D_8xZ4rc1gZpibBq9LAvn7AilcUkJf5_o2nRRB/exec'; 

        const queryParams = new URLSearchParams({
            p_nombre: nombreURL,
            p_asiste: document.getElementById('asistencia').value,
            p_pases: selectPases.value,
            p_acomp: nombresAcomp
        }).toString();

        fetch(urlScript + "?" + queryParams, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h2>¡Confirmado!</h2><p>Tu respuesta ha sido registrada. ¡Gracias!</p>";
        }).catch(() => {
            alert("Error de envío.");
            btn.disabled = false;
        });
    }
    
    if(pasesMax > 1) generarInputsAcomp();
</script>
</body>
</html>
