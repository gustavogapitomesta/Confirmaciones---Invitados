<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmación</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .background-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center bottom; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0) 50%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            height: 100vh;
            padding: 30px 15px; /* Menos margen lateral */
            box-sizing: border-box;
        }

        /* RECUADRO MÁS PEQUEÑO Y COMPACTO */
        .form-card { 
            background: rgba(255, 255, 255, 0.96);
            padding: 20px; 
            border-radius: 15px; 
            width: 90%; /* Ajuste elástico */
            max-width: 310px; /* Tamaño pequeño para que no se corte */
            margin: 0 auto;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h2 { color: var(--gold); font-size: 15px; margin: 0 0 12px 0; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
        
        .info-pases { 
            background: #fdfaf3; 
            padding: 8px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            font-size: 11px; 
            color: #444; 
            border: 1px solid var(--gold); 
        }
        
        label { display: block; text-align: left; margin: 8px 0 4px; font-size: 9px; font-weight: 600; color: #777; text-transform: uppercase; }
        
        select, input { 
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; 
            font-family: 'Montserrat'; font-size: 13px; background: white; margin-bottom: 5px;
            -webkit-appearance: none;
        }

        .acomp-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; display: none; }
        
        .btn-submit { 
            width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 6px; 
            background: var(--gold); color: white; font-weight: bold; cursor: pointer; font-size: 13px; 
        }

        @media (min-width: 768px) {
            .content-wrapper { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <img src="novios.jpeg" id="bgImg">
    </div>
    
    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="form-card" id="formCard">
            <h2 id="saludo">HOLA</h2>
            
            <div class="info-pases" id="infoPases">Cargando...</div>

            <form id="confirmForm">
                <label>¿Confirmas tu asistencia?</label>
                <select id="asistencia" required onchange="validarAsistencia()">
                    <option value="SÍ">SÍ, ASISTIRÉ</option>
                    <option value="NO">NO PODRÉ ASISTIR</option>
                </select>

                <div id="seccionCantidadPases">
                    <label>Pases a confirmar:</label>
                    <select id="pasesConfirmados" onchange="generarInputsAcomp()"></select>
                </div>

                <div id="acompSection" class="acomp-section">
                    <label>Nombre de acompañantes:</label>
                    <div id="inputsAcomp"></div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">CONFIRMAR</button>
            </form>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nombreURL = params.get('id') ? params.get('id').replace(/_/g, ' ') : "Invitado";
    const pasesMax = parseInt(params.get('pases')) || 1;

    document.getElementById('saludo').innerText = "¡HOLA, " + nombreURL.toUpperCase() + "!";
    document.getElementById('infoPases').innerText = "Tienes " + pasesMax + " pase(s) reservado(s).";

    const selectPases = document.getElementById('pasesConfirmados');
    for (let i = 1; i <= pasesMax; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectPases.appendChild(opt);
    }

    // RESTRICCIÓN DE 1 PASO ACTIVA
    if (pasesMax === 1) {
        document.getElementById('seccionCantidadPases').style.display = "none";
        document.getElementById('acompSection').style.display = "none";
        selectPases.value = 1;
    }

    function validarAsistencia() {
        const asiste = document.getElementById('asistencia').value;
        const seccionPases = document.getElementById('seccionCantidadPases');
        const seccionAcomp = document.getElementById('acompSection');

        if (asiste === "NO") {
            seccionPases.style.display = "none";
            seccionAcomp.style.display = "none";
        } else {
            if (pasesMax > 1) {
                seccionPases.style.display = "block";
                generarInputsAcomp();
            }
        }
    }

    function generarInputsAcomp() {
        const cantidad = parseInt(selectPases.value);
        const container = document.getElementById('inputsAcomp');
        const seccionAcomp = document.getElementById('acompSection');
        container.innerHTML = "";

        if (cantidad > 1) {
            seccionAcomp.style.display = "block";
            for (let i = 1; i < cantidad; i++) {
                container.innerHTML += `<input type="text" class="nombre-acomp" placeholder="Nombre completo" required style="margin-bottom:6px;">`;
            }
        } else {
            seccionAcomp.style.display = "none";
        }
    }

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";
        
        const urlScript = 'https://script.google.com/macros/s/AKfycbwOgIwOfJB2WAu2slVtCq8xRiTtd9D_8xZ4rc1gZpibBq9LAvn7AilcUkJf5_o2nRRB/exec'; 

        const queryParams = new URLSearchParams({
            p_nombre: nombreURL,
            p_asiste: document.getElementById('asistencia').value,
            p_pases: selectPases.value,
            p_acomp: nombresAcomp
        }).toString();

        fetch(urlScript + "?" + queryParams, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h3>¡Confirmado!</h3><p style='font-size:12px;'>Gracias por tu respuesta.</p>";
        }).catch(() => {
            alert("Error de envío.");
            btn.disabled = false;
        });
    }
    
    if(pasesMax > 1) generarInputsAcomp();
</script>
</body>
</html>
