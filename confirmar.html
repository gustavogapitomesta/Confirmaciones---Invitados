<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Maria Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        body { margin: 0; padding: 0; background: #fdfbf7; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: var(--gold); font-size: 22px; margin-bottom: 20px; }
        .info-pases { background: #f9f4e9; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #555; border: 1px solid #eee; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-size: 13px; font-weight: 600; color: #444; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Montserrat'; box-sizing: border-box; }
        .acomp-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: none; } /* Oculto por defecto */
        .btn-submit { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 8px; background: var(--gold); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="form-card" id="formCard">
    <h2 id="saludo">Cargando invitación...</h2>
    
    <div class="info-pases" id="infoPases">
        Cargando información de pases...
    </div>

    <form id="confirmForm">
        <label>¿Confirmas tu asistencia?</label>
        <select id="asistencia" required onchange="validarAsistencia()">
            <option value="SÍ">Sí, asistiré</option>
            <option value="NO">No podré asistir</option>
        </select>

        <div id="seccionCantidadPases">
            <label>Pases a confirmar:</label>
            <select id="pasesConfirmados" onchange="generarInputsAcomp()"></select>
        </div>

        <div id="acompSection" class="acomp-section">
            <label>Nombres de acompañantes:</label>
            <div id="inputsAcomp"></div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">CONFIRMAR ASISTENCIA</button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nombreURL = params.get('id') ? params.get('id').replace(/_/g, ' ') : "Invitado";
    const pasesMax = parseInt(params.get('pases')) || 1;

    document.getElementById('saludo').innerText = "¡Hola, " + nombreURL.toUpperCase() + "!";
    document.getElementById('infoPases').innerText = "Tienes " + pasesMax + " pase(s) reservado(s).";

    // Configurar el selector de pases según el máximo del Excel
    const selectPases = document.getElementById('pasesConfirmados');
    for (let i = 1; i <= pasesMax; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectPases.appendChild(opt);
    }

    // LÓGICA CRÍTICA: Bloquear si es solo 1 pase
    if (pasesMax === 1) {
        document.getElementById('seccionCantidadPases').style.display = "none";
        document.getElementById('acompSection').style.display = "none";
        selectPases.value = 1;
    }

    function validarAsistencia() {
        const asiste = document.getElementById('asistencia').value;
        const seccionPases = document.getElementById('seccionCantidadPases');
        const seccionAcomp = document.getElementById('acompSection');

        if (asiste === "NO") {
            seccionPases.style.display = "none";
            seccionAcomp.style.display = "none";
        } else {
            // Solo volver a mostrar si los pases son más de 1
            if (pasesMax > 1) {
                seccionPases.style.display = "block";
                generarInputsAcomp();
            }
        }
    }

    function generarInputsAcomp() {
        const cantidad = parseInt(selectPases.value);
        const container = document.getElementById('inputsAcomp');
        const seccionAcomp = document.getElementById('acompSection');
        
        container.innerHTML = "";

        // Solo mostrar sección de acompañantes si el invitado confirma más de 1 pase
        if (cantidad > 1) {
            seccionAcomp.style.display = "block";
            for (let i = 1; i < cantidad; i++) {
                container.innerHTML += `<input type="text" class="nombre-acomp" placeholder="Nombre del acompañante ${i}" required style="margin-bottom:10px;">`;
            }
        } else {
            seccionAcomp.style.display = "none";
        }
    }

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";
        
        // URL DE TU GOOGLE APPS SCRIPT
        const urlScript = 'https://script.google.com/macros/s/AKfycbwOgIwOfJB2WAu2slVtCq8xRiTtd9D_8xZ4rc1gZpibBq9LAvn7AilcUkJf5_o2nRRB/exec'; 

        const queryParams = new URLSearchParams({
            p_nombre: nombreURL,
            p_asiste: document.getElementById('asistencia').value,
            p_pases: selectPases.value,
            p_acomp: nombresAcomp
        }).toString();

        fetch(urlScript + "?" + queryParams, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h2>¡Confirmado!</h2><p>Muchas gracias por responder. Tu respuesta ha sido registrada con éxito.</p>";
        }).catch(() => {
            alert("Error al enviar. Inténtalo de nuevo.");
            btn.disabled = false;
            btn.innerText = "CONFIRMAR ASISTENCIA";
        });
    }
    
    // Inicializar la vista
    if(pasesMax > 1) generarInputsAcomp();
</script>

</body>
</html>
