<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Maria Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
:root { --gold: #c9a96e; --white: #ffffff; }
body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; overflow: hidden; }

/* Foto de fondo optimizada */
.bg-photo {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%), url('novios.jpeg');
    background-size: cover;
    background-position: center 5%; /* Sube un poco la foto para centrar rostros */
    z-index: 1;
}

.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    align-items: center; /* CENTRADO VERTICAL ABSOLUTO */
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
}

.form-card {
    background: rgba(255, 255, 255, 0.75); /* MÁS TRANSPARENTE Y SUTIL */
    backdrop-filter: blur(8px); /* EFECTO CRISTAL ELEGANTE */
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 320px; /* CUADRO MÁS PEQUEÑO */
    text-align: center;
    border: 1px solid rgba(255,255,255,0.4);
}

h1 { 
    font-family: 'Cormorant Garamond', serif; 
    font-size: 20px; /* LETRA MÁS PEQUEÑA Y FINA */
    margin: 0 0 5px 0; 
    color: #1a1a1a; 
    font-weight: 600;
}

.subtitle { 
    font-size: 10px; 
    color: #444; 
    margin-bottom: 20px; 
    text-transform: uppercase; 
    letter-spacing: 2px;
}

label { display: block; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: var(--gold); }

select, input {
    width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; 
    border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8);
    font-size: 14px; box-sizing: border-box; outline: none;
}

.btn-confirm {
    background: var(--gold); color: white; border: none; padding: 14px; width: 100%;
    border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; text-transform: uppercase;
}
    </style>
</head>
<body>

<div class="bg-photo"></div>

<div class="content">
    <div class="form-card" id="formCard">
        <h1>María Claudia & Gustavo</h1>
        <p class="subtitle">Confirmación</p>

        <form id="confirmForm">
            <label>¿Nos acompañarás?</label>
            <select id="asistencia" required onchange="togglePases()">
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="Si">Sí, con mucho gusto</option>
                <option value="No">No podré asistir</option>
            </select>

            <div id="pasesContainer" style="display:none;">
                <div class="acomp-section">
                    <label>Número de pases</label>
                    <input type="number" id="pasesConfirmados" min="1">
                    <div id="nombresAcompContainer"></div>
                </div>
            </div>

            <button type="submit" class="btn-confirm">CONFIRMAR</button>
        </form>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const pasesMax = parseInt(urlParams.get('pases')) || 1;

function togglePases() {
    const asis = document.getElementById('asistencia').value;
    const container = document.getElementById('pasesContainer');
    if (asis === 'Si' && pasesMax > 1) {
        container.style.display = 'block';
        const input = document.getElementById('pasesConfirmados');
        input.value = pasesMax;
        input.max = pasesMax;
        generarNombresAcomp();
    } else {
        container.style.display = 'none';
    }
}

document.getElementById('pasesConfirmados').oninput = generarNombresAcomp;

function generarNombresAcomp() {
    const cant = parseInt(document.getElementById('pasesConfirmados').value);
    const container = document.getElementById('nombresAcompContainer');
    container.innerHTML = '';

    if (cant > pasesMax) {
        alert(`Máximo pases permitidos: ${pasesMax}`);
        document.getElementById('pasesConfirmados').value = pasesMax;
        generarNombresAcomp();
        return;
    }

    if (cant > 1) {
        for (let i = 1; i < cant; i++) {
            container.innerHTML += `
                <label>Nombre del acompañante ${i}</label>
                <input type="text" placeholder="Escribe aquí..." required name="acomp_${i}">
            `;
        }
    }
}

document.getElementById('confirmForm').onsubmit = function(e) {
    e.preventDefault();
    document.getElementById('formCard').innerHTML = `
        <h1 style="font-size:20px;">¡Gracias!</h1>
        <p style="font-size:13px; color:#555;">Tu respuesta ha sido enviada.</p>
    `;
};
</script>
</body>
</html>
