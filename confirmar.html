<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Maria Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .bg-photo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 40%), url('novios.jpeg'); background-size: cover; background-position: center; z-index: 1; }
        .form-card { position: relative; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; margin: 40px auto; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 5px; color: #1a1a1a; }
        label { display: block; font-size: 10px; font-weight: 700; margin-top: 10px; color: var(--gold); text-transform: uppercase; text-align: left; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .btn-confirm { background: var(--gold); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 600; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-photo"></div>
    <div class="form-card" id="formCard">
        <h1>María Claudia & Gustavo</h1>
        <p style="font-size:10px; letter-spacing:1px;">CONFIRMACIÓN DE ASISTENCIA</p>
        <form id="confirmForm">
            <label>¿Nos acompañarás?</label>
            <select id="asistencia" required onchange="actualizarInterfaz()">
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="Si">Sí, con mucho gusto</option>
                <option value="No">No podré asistir</option>
            </select>
            
            <div id="seccionPases" style="display:none;">
                <label>Número de personas</label>
                <input type="number" id="pasesConfirmados" min="1">
                <div id="contenedorAcompanantes"></div>
            </div>
            
            <button type="submit" class="btn-confirm" id="btnSubmit">CONFIRMAR</button>
        </form>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const pasesMax = parseInt(params.get('pases')) || 1;
    const nombreURL = (params.get('id') || "Invitado").replace(/_/g, " ");

    function actualizarInterfaz() {
        const asiste = document.getElementById('asistencia').value;
        const seccion = document.getElementById('seccionPases');
        if (asiste === 'Si') {
            seccion.style.display = 'block';
            document.getElementById('pasesConfirmados').value = pasesMax;
            generarInputsAcomp();
        } else {
            seccion.style.display = 'none';
        }
    }

    function generarInputsAcomp() {
        const cant = parseInt(document.getElementById('pasesConfirmados').value) || 1;
        const contenedor = document.getElementById('contenedorAcompanantes');
        contenedor.innerHTML = '';
        if (cant > 1) {
            for (let i = 1; i < cant; i++) {
                contenedor.innerHTML += `<label>Acompañante ${i}</label><input type="text" class="nombre-acomp" placeholder="Nombre completo" required>`;
            }
        }
    }

    document.getElementById('pasesConfirmados').oninput = generarInputsAcomp;

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";

        const datos = new URLSearchParams();
        datos.append('p_nombre', nombreURL);
        datos.append('p_asiste', document.getElementById('asistencia').value);
        datos.append('p_pases', document.getElementById('pasesConfirmados').value);
        datos.append('p_acomp', nombresAcomp);

        fetch('TU_NUEVA_URL_DE_APPS_SCRIPT', {
            method: 'POST',
            body: datos,
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h2>¡Gracias!</h2><p>Tu respuesta ha sido registrada.</p>";
        }).catch(() => {
            // Incluso si hay error de CORS, los datos suelen llegar. 
            // Si el Excel se llena, ignoramos este mensaje.
            document.getElementById('formCard').innerHTML = "<h2>¡Gracias!</h2><p>Tu respuesta ha sido enviada con éxito.</p>";
        });
    };
</script>
</body>
</html>
