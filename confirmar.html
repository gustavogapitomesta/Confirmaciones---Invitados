        .btn-no { background: white; border: 1px solid #ddd; color: #777; }

    async function enviar(respuesta) {
    const status = document.getElementById('status');
    status.style.display = "block";
    
    // Preparamos los datos como parámetros de URL (más compatible con Google)
    const formData = new URLSearchParams();
    formData.append('nombre', invitado[0]);
    formData.append('pases', invitado[2]);
    formData.append('asistencia', respuesta);

    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Importante para evitar errores de seguridad
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        // Si llegamos aquí, mostramos éxito
        document.getElementById('main-content').innerHTML = 
            "<h2>¡Gracias!</h2><p>Tu respuesta para <b>" + invitado[0] + "</b> ha sido registrada.</p>";
    } catch (e) {
