<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Maria Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: 'Montserrat', sans-serif; 
            background-color: #000;
        }

        /* FONJO AJUSTADO PARA NO TAPAR ROSTROS */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Ajustamos la posición al 10% para que las cabezas bajen un poco y se vean */
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%), 
                        url('novios.jpg');
            background-size: cover;
            background-position: center 10%; 
            z-index: -1;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Empuja el formulario hacia abajo */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-card { 
            background: rgba(255, 255, 255, 0.85); /* Mayor transparencia para ver el fondo */
            backdrop-filter: blur(10px); /* Efecto esmerilado elegante */
            padding: 25px; 
            border-radius: 25px 25px 0 0; /* Bordes redondeados arriba */
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3); 
            width: 100%;
            max-width: 450px; 
            margin: 0 auto;
            text-align: center; 
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        h2 { color: var(--gold); font-size: 18px; margin-bottom: 15px; letter-spacing: 1px; }
        .info-pases { background: rgba(201, 169, 110, 0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; color: #444; border: 1px solid var(--gold); }
        label { display: block; text-align: left; margin: 12px 0 5px; font-size: 11px; font-weight: 600; color: #333; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Montserrat'; box-sizing: border-box; font-size: 14px; background: white; }
        .acomp-section { margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--gold); display: none; }
        .btn-submit { width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 10px; background: var(--gold); color: white; font-weight: bold; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        /* Ajuste para escritorio */
        @media (min-width: 768px) {
            .wrapper { justify-content: center; }
            .form-card { border-radius: 25px; }
        }
    </style>
</head>
<body>

<div class="bg-container"></div>

<div class="wrapper">
    <div class="form-card" id="formCard">
        <h2 id="saludo">¡HOLA!</h2>
        
        <div class="info-pases" id="infoPases">Cargando pases...</div>

        <form id="confirmForm">
            <label>¿Confirmas tu asistencia?</label>
            <select id="asistencia" required onchange="validarAsistencia()">
                <option value="SÍ">SÍ, ASISTIRÉ</option>
                <option value="NO">NO PODRÉ ASISTIR</option>
            </select>

            <div id="seccionCantidadPases">
                <label>Pases a confirmar:</label>
                <select id="pasesConfirmados" onchange="generarInputsAcomp()"></select>
            </div>

            <div id="acompSection" class="acomp-section">
                <label>Nombres de acompañantes:</label>
                <div id="inputsAcomp"></div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">ENVIAR CONFIRMACIÓN</button>
        </form>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nombreURL = params.get('id') ? params.get('id').replace(/_/g, ' ') : "Invitado";
    const pasesMax = parseInt(params.get('pases')) || 1;

    document.getElementById('saludo').innerText = "¡HOLA, " + nombreURL.toUpperCase() + "!";
    document.getElementById('infoPases').innerText = "Tienes " + pasesMax + " pase(s) reservado(s).";

    const selectPases = document.getElementById('pasesConfirmados');
    for (let i = 1; i <= pasesMax; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectPases.appendChild(opt);
    }

    // MANTIENE RESTRICCIÓN DE 1 PASO
    if (pasesMax === 1) {
        document.getElementById('seccionCantidadPases').style.display = "none";
        document.getElementById('acompSection').style.display = "none";
        selectPases.value = 1;
    }

    function validarAsistencia() {
        const asiste = document.getElementById('asistencia').value;
        const seccionPases = document.getElementById('seccionCantidadPases');
        const seccionAcomp = document.getElementById('acompSection');

        if (asiste === "NO") {
            seccionPases.style.display = "none";
            seccionAcomp.style.display = "none";
        } else {
            if (pasesMax > 1) {
                seccionPases.style.display = "block";
                generarInputsAcomp();
            }
        }
    }

    function generarInputsAcomp() {
        const cantidad = parseInt(selectPases.value);
        const container = document.getElementById('inputsAcomp');
        const seccionAcomp = document.getElementById('acompSection');
        container.innerHTML = "";

        if (cantidad > 1) {
            seccionAcomp.style.display = "block";
            for (let i = 1; i < cantidad; i++) {
                container.innerHTML += `<input type="text" class="nombre-acomp" placeholder="Nombre completo" required style="margin-bottom:8px;">`;
            }
        } else {
            seccionAcomp.style.display = "none";
        }
    }

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";
        
        const urlScript = 'https://script.google.com/macros/s/AKfycbwOgIwOfJB2WAu2slVtCq8xRiTtd9D_8xZ4rc1gZpibBq9LAvn7AilcUkJf5_o2nRRB/exec'; 

        const queryParams = new URLSearchParams({
            p_nombre: nombreURL,
            p_asiste: document.getElementById('asistencia').value,
            p_pases: selectPases.value,
            p_acomp: nombresAcomp
        }).toString();

        fetch(urlScript + "?" + queryParams, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h2 style='margin-top:20px;'>¡Confirmado!</h2><p>Gracias por acompañarnos.</p>";
        }).catch(() => {
            alert("Error. Reintente.");
            btn.disabled = false;
        });
    }
    
    if(pasesMax > 1) generarInputsAcomp();
</script>
</body>
</html>
