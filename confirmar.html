<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Mª Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; --dark: #1a1018; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; }
        
        /* Fondo con la foto de los novios */
        .bg-photo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(0,0,0,0.8) 80%), url('novios.jpeg');
            background-size: cover;
            background-position: center 20%; /* Mantiene rostros visibles arriba */
            z-index: 1;
        }

        /* Contenedor del formulario - Estética Delicada */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Lo empuja abajo para no tapar rostros */
            padding: 20px;
            box-sizing: border-box;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.96);
            padding: 25px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.2);
            max-height: 70vh;
            overflow-y: auto;
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; margin: 0 0 10px 0; text-align: center; }
        p.subtitle { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; }

        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: var(--gold); }
        select, input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd;
            font-family: 'Montserrat', sans-serif; font-size: 15px; box-sizing: border-box;
        }

        .btn-confirm {
            background: var(--gold); color: white; border: none; padding: 16px; width: 100%;
            border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .acomp-section { background: #f9f6f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="bg-photo"></div>

<div class="content">
    <div class="form-card" id="formCard">
        <h1>Mª Claudia & Gustavo</h1>
        <p class="subtitle" id="guestWelcome">Cargando invitación...</p>

        <form id="confirmForm">
            <label>¿Asistirás a la boda?</label>
            <select id="asistencia" required onchange="togglePases()">
                <option value="" disabled selected>Seleccionar...</option>
                <option value="Si">¡Sí, allí estaré!</option>
                <option value="No">No podré asistir</option>
            </select>

            <div id="pasesContainer" style="display:none;">
                <div class="acomp-section">
                    <label id="labelPases">¿Cuántas personas asistirán?</label>
                    <input type="number" id="pasesConfirmados" min="1" oninput="generarNombresAcomp()">
                    
                    <div id="nombresAcompContainer"></div>
                </div>
            </div>

            <button type="submit" class="btn-confirm">Confirmar Asistencia</button>
        </form>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const pasesMax = parseInt(urlParams.get('pases')) || 1;

document.getElementById('guestWelcome').innerText = `Confirmación para ${nPases === 1 ? '1 pase' : pasesMax + ' pases'}`;

function togglePases() {
    const asis = document.getElementById('asistencia').value;
    const container = document.getElementById('pasesContainer');
    const inputPases = document.getElementById('pasesConfirmados');

    if (asis === 'Si' && pasesMax > 1) {
        container.style.display = 'block';
        inputPases.max = pasesMax;
        inputPases.value = pasesMax;
        generarNombresAcomp();
    } else {
        container.style.display = 'none';
    }
}

function generarNombresAcomp() {
    const cant = parseInt(document.getElementById('pasesConfirmados').value);
    const container = document.getElementById('nombresAcompContainer');
    container.innerHTML = '';

    if (cant > pasesMax) {
        alert(`Lo sentimos, el número máximo de pases para esta invitación es ${pasesMax}`);
        document.getElementById('pasesConfirmados').value = pasesMax;
        generarNombresAcomp();
        return;
    }

    // Si hay más de 1 persona, pedir nombres de los acompañantes (Pases - 1)
    if (cant > 1) {
        for (let i = 1; i < cant; i++) {
            container.innerHTML += `
                <label>Nombre del acompañante ${i}</label>
                <input type="text" placeholder="Nombre completo" required name="acomp_${i}">
            `;
        }
    }
}

document.getElementById('confirmForm').onsubmit = function(e) {
    e.preventDefault();
    document.getElementById('formCard').innerHTML = `
        <div style="text-align:center; padding: 40px 0;">
            <h2 style="color:var(--gold); font-family:Cormorant Garamond;">¡Gracias!</h2>
            <p>Tu respuesta ha sido enviada con éxito a Natalia Rodas.</p>
        </div>
    `;
};
</script>
</body>
</html>
