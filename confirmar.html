<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmación - Maria Claudia & Gustavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a96e; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
        }

        /* CONTENEDOR DE IMAGEN DEFINITIVO */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-color: #000;
        }

        .bg-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 5%; /* Asegura ver las cabezas */
            display: block;
        }

        /* CAPA OSCURA PARA LEER TEXTO */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }

        /* CONTENEDOR DEL FORMULARIO */
        .main-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Empuja el cuadro hacia abajo */
            min-height: 100vh;
            padding: 0;
        }

        .form-card { 
            background: rgba(255, 255, 255, 0.95); /* Blanco casi sólido para máxima legibilidad */
            padding: 30px 25px 40px; 
            border-radius: 30px 30px 0 0; /* Redondeado solo arriba */
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--gold); font-size: 18px; margin-bottom: 15px; letter-spacing: 1px; }
        .info-pases { background: #fdfaf3; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; color: #444; border: 1px solid var(--gold); font-weight: 600; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-size: 11px; font-weight: 600; color: #333; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Montserrat'; box-sizing: border-box; font-size: 15px; background: white; -webkit-appearance: none; }
        .acomp-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--gold); display: none; }
        .btn-submit { width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 10px; background: var(--gold); color: white; font-weight: bold; cursor: pointer; font-size: 15px; }

        /* Escritorio */
        @media (min-width: 768px) {
            .main-content { justify-content: center; padding: 20px; }
            .form-card { border-radius: 25px; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <img src="novios.jpg" alt="Novios">
    </div>
    
    <div class="overlay"></div>

    <div class="main-content">
        <div class="form-card" id="formCard">
            <h2 id="saludo">¡HOLA!</h2>
            
            <div class="info-pases" id="infoPases">Cargando pases...</div>

            <form id="confirmForm">
                <label>¿Confirmas tu asistencia?</label>
                <select id="asistencia" required onchange="validarAsistencia()">
                    <option value="SÍ">SÍ, ASISTIRÉ</option>
                    <option value="NO">NO PODRÉ ASISTIR</option>
                </select>

                <div id="seccionCantidadPases">
                    <label>Pases a confirmar:</label>
                    <select id="pasesConfirmados" onchange="generarInputsAcomp()"></select>
                </div>

                <div id="acompSection" class="acomp-section">
                    <label>Nombres de acompañantes:</label>
                    <div id="inputsAcomp"></div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">CONFIRMAR MI ASISTENCIA</button>
            </form>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nombreURL = params.get('id') ? params.get('id').replace(/_/g, ' ') : "Invitado";
    const pasesMax = parseInt(params.get('pases')) || 1;

    document.getElementById('saludo').innerText = "¡HOLA, " + nombreURL.toUpperCase() + "!";
    document.getElementById('infoPases').innerText = "Tienes " + pasesMax + " pase(s) reservado(s).";

    const selectPases = document.getElementById('pasesConfirmados');
    for (let i = 1; i <= pasesMax; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        selectPases.appendChild(opt);
    }

    // RESTRICCIÓN 1 PASE ACTIVA
    if (pasesMax === 1) {
        document.getElementById('seccionCantidadPases').style.display = "none";
        document.getElementById('acompSection').style.display = "none";
        selectPases.value = 1;
    }

    function validarAsistencia() {
        const asiste = document.getElementById('asistencia').value;
        const seccionPases = document.getElementById('seccionCantidadPases');
        const seccionAcomp = document.getElementById('acompSection');

        if (asiste === "NO") {
            seccionPases.style.display = "none";
            seccionAcomp.style.display = "none";
        } else {
            if (pasesMax > 1) {
                seccionPases.style.display = "block";
                generarInputsAcomp();
            }
        }
    }

    function generarInputsAcomp() {
        const cantidad = parseInt(selectPases.value);
        const container = document.getElementById('inputsAcomp');
        const seccionAcomp = document.getElementById('acompSection');
        container.innerHTML = "";

        if (cantidad > 1) {
            seccionAcomp.style.display = "block";
            for (let i = 1; i < cantidad; i++) {
                container.innerHTML += `<input type="text" class="nombre-acomp" placeholder="Nombre completo" required style="margin-bottom:10px;">`;
            }
        } else {
            seccionAcomp.style.display = "none";
        }
    }

    document.getElementById('confirmForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

        const nombresAcomp = Array.from(document.querySelectorAll('.nombre-acomp')).map(i => i.value).join(', ') || "Ninguno";
        
        const urlScript = 'https://script.google.com/macros/s/AKfycbwOgIwOfJB2WAu2slVtCq8xRiTtd9D_8xZ4rc1gZpibBq9LAvn7AilcUkJf5_o2nRRB/exec'; 

        const queryParams = new URLSearchParams({
            p_nombre: nombreURL,
            p_asiste: document.getElementById('asistencia').value,
            p_pases: selectPases.value,
            p_acomp: nombresAcomp
        }).toString();

        fetch(urlScript + "?" + queryParams, {
            method: 'POST',
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('formCard').innerHTML = "<h2 style='margin-top:20px;'>¡Confirmado!</h2><p>Muchas gracias por responder. Te esperamos.</p>";
        }).catch(() => {
            alert("Error al enviar. Inténtalo de nuevo.");
            btn.disabled = false;
        });
    }
    
    if(pasesMax > 1) generarInputsAcomp();
</script>
</body>
</html>
